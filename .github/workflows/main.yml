name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/ci
      - feature/deploy
      - matvey
      - frontend-liza
      - frontend-maria
      - develop
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t password-generator ./backend


  test:
    runs-on: ubuntu-latest
    needs: build 
    container:
      image: python:3.12-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies and run tests
        run: |
          cd backend
          pip install -r requirements.txt pytest httpx
          pytest tests/ -v
