services:
  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # хост БД — имя сервиса в сети compose (не localhost)
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/password_generator}
    depends_on:
      db:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      DOCKER: "1"
      # Внутри контейнера 127.0.0.1:8000 — не бэкенд; прокси Vite → сервис backend
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: always
  
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-password_generator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:

